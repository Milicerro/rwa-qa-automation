name: ci
on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout tests repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install test deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Clone RWA app
        run: |
          git clone https://github.com/cypress-io/cypress-realworld-app .rwa
          cd .rwa
          corepack enable || true
          yarn install --frozen-lockfile

      - name: Start RWA app
        run: |
          cd .rwa
          yarn dev &
          npx wait-on http-get://localhost:3000

      - name: Set BASE_URL
        run: |
          echo "BASE_URL=http://localhost:3000" >> $GITHUB_ENV
          echo "PW_TIMEOUT=30000" >> $GITHUB_ENV
          echo "PW_EXPECT_TIMEOUT=8000" >> $GITHUB_ENV

      - name: Smoke tests
        run: npm run test:smoke

      - name: API tests
        run: npm run test:api

      - name: UI tests
        run: npm run test:ui

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload traces/videos/screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pw-artifacts
          path: |
            test-results
            playwright-report
